<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTraining | Super-Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h2 class="text-3xl font-black text-slate-900 mb-2">Super-Admin</h2>
            <p class="text-slate-400 font-bold mb-8 uppercase tracking-widest text-xs">Acesso Restrito</p>
            <form id="loginForm" class="space-y-4">
                <input id="loginEmail" type="email" placeholder="Email de Admin" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                <input id="loginPassword" type="password" placeholder="Palavra-passe" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                <button type="submit" class="w-full btn-primary text-white py-4 rounded-2xl font-bold mt-4">Entrar na Consola</button>
            </form>
            <p id="loginError" class="text-red-500 text-sm font-bold mt-4 text-center hidden"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="p-4 md:p-8 opacity-0 transition-opacity duration-500">
        <div class="max-w-6xl mx-auto">
            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
                <div>
                    <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Super-Admin <span class="text-indigo-600">Console</span></h1>
                    <p class="text-slate-500 mt-2 font-medium">Gestão global de infraestrutura e boxes FitTraining.</p>
                </div>
                <div id="stats" class="flex gap-4 items-center">
                    <!-- Stats injected here -->
                    <button onclick="logout()" class="ml-4 p-3 text-red-500 hover:bg-red-50 rounded-2xl transition-all" title="Sair">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Main Content -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Box List -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex items-center justify-between">
                        <h2 class="text-xl font-bold text-slate-800">Boxes Registadas</h2>
                        <div class="flex gap-2">
                            <button onclick="loadBoxes()" class="p-2 text-slate-400 hover:text-indigo-600 transition-all" title="Atualizar">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                            <button onclick="showCreateBox()" class="btn-primary text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
                                + Nova Box
                            </button>
                        </div>
                    </div>
                    <div id="boxList" class="grid grid-cols-1 gap-4">
                        <!-- Boxes injected here -->
                        <div class="animate-pulse bg-white p-6 rounded-3xl h-32"></div>
                    </div>
                </div>

                <!-- Box Users Management -->
                <div class="space-y-6">
                    <h2 class="text-xl font-bold text-slate-800">Utilizadores da Box</h2>
                    <div id="userListContainer" class="glass rounded-3xl p-6 min-h-[400px]">
                        <div id="userListPlaceholder" class="flex flex-col items-center justify-center h-full text-slate-400 text-center py-20">
                            <svg class="w-12 h-12 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            <p class="font-medium">Seleciona uma box para<br>gerir os seus administradores.</p>
                        </div>
                        <div id="userList" class="space-y-4 hidden">
                            <!-- Users injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Box Modal -->
    <div id="createModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in fade-in zoom-in duration-300">
            <h3 class="text-2xl font-black text-slate-900 mb-6">Criar Nova Box</h3>
            <form id="createForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">Nome da Box</label>
                    <input name="boxName" type="text" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">Localização</label>
                    <input name="boxLocation" type="text" class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="pt-4 border-t border-slate-100 mt-4">
                    <label class="block text-xs font-bold text-indigo-500 uppercase tracking-wider mb-3">Admin Inicial</label>
                    <div class="space-y-3">
                        <input name="adminName" type="text" placeholder="Nome Completo" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                        <input name="adminEmail" type="email" placeholder="Email" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                        <input name="adminPassword" type="password" placeholder="Password" required class="w-full bg-slate-50 border-none rounded-2xl px-5 py-4 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="hideCreateBox()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">Cancelar</button>
                    <button type="submit" class="flex-2 btn-primary text-white py-4 px-8 rounded-2xl font-bold">Criar Box</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/fittraining/api';
        let selectedBoxId = null;

        async function apiFetch(path, options = {}) {
            const token = localStorage.getItem('fitToken');
            if (!token) {
                showLogin();
                return;
            }

            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                ...options.headers
            };

            try {
                const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
                if (res.status === 401 || res.status === 403) {
                    // Only log out if it's not a login attempt
                    if (!path.includes('/auth/login')) {
                        localStorage.removeItem('fitToken');
                        showLogin();
                    }
                }
                return res;
            } catch (e) {
                console.error('Fetch Error:', e);
                return { ok: false, status: 500, json: () => Promise.resolve({ error: 'Erro de ligação' }) };
            }
        }

        function showLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainDashboard').style.opacity = '0';
        }

        function hideLogin() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').style.opacity = '1';
            loadStats();
            loadBoxes();
        }

        function logout() {
            localStorage.removeItem('fitToken');
            showLogin();
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.classList.add('hidden');

            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.user.role !== 'ADMIN') {
                    errorEl.textContent = 'Acesso negado: Não és um Super-Administrador.';
                    errorEl.classList.remove('hidden');
                    return;
                }
                localStorage.setItem('fitToken', data.token);
                hideLogin();
            } else {
                errorEl.textContent = 'Email ou palavra-passe incorretos.';
                errorEl.classList.remove('hidden');
            }
        };

        async function loadStats() {
            const res = await apiFetch('/superadmin/stats');
            if (res?.ok) {
                const data = await res.json();
                document.getElementById('stats').innerHTML = `
                    <div class="bg-white px-5 py-3 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Boxes</p>
                        <p class="text-xl font-black text-indigo-600">${data.totalBoxes}</p>
                    </div>
                    <div class="bg-white px-5 py-3 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Utilizadores</p>
                        <p class="text-xl font-black text-emerald-600">${data.totalAthletes + (data.totalBoxes || 0)}</p>
                    </div>
                `;
            }
        }

        async function loadBoxes() {
            const res = await apiFetch('/superadmin/boxes');
            if (res?.ok) {
                const boxes = await res.json();
                boxes.sort((a, b) => {
                    if (a.approved !== b.approved) return a.approved ? 1 : -1;
                    return new Date(b.createdAt) - new Date(a.createdAt);
                });
                
                const list = document.getElementById('boxList');
                list.innerHTML = boxes.map(box => `
                    <div onclick="selectBox(${box.id})" class="group cursor-pointer bg-white p-6 rounded-3xl shadow-sm border-2 ${selectedBoxId === box.id ? 'border-indigo-500' : 'border-transparent'} hover:border-slate-200 transition-all flex items-center justify-between">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-all">
                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="font-black text-slate-900 text-lg">${box.name}</h3>
                                    <span class="px-2 py-0.5 rounded-md text-[10px] font-black uppercase ${box.approved ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                                        ${box.approved ? 'Aprovada' : 'Pendente'}
                                    </span>
                                </div>
                                <p class="text-slate-400 text-sm font-semibold">${box.location || 'Sem localização'}</p>
                                <div class="flex gap-4 mt-1 text-[11px] font-bold text-slate-400 uppercase tracking-tight">
                                    <span>${box._count.users} Atletas</span>
                                    <span>${box._count.classes} Aulas</span>
                                    <span class="text-indigo-500">Cod: ${box.inviteCode}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); toggleApprove(${box.id})" class="p-3 bg-slate-50 text-slate-400 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 transition-all" title="${box.approved ? 'Desativar' : 'Aprovar'}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                            <button onclick="event.stopPropagation(); deleteBox(${box.id})" class="p-3 bg-slate-50 text-slate-400 rounded-xl hover:bg-red-50 hover:text-red-600 transition-all" title="Eliminar">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function toggleApprove(id) {
            const res = await apiFetch(`/superadmin/boxes/${id}/approve`, { method: 'PATCH' });
            if (res?.ok) loadBoxes();
        }

        async function deleteBox(id) {
            if (!confirm('Tens a certeza? Isto vai apagar TODOS os dados da box (atletas, treinos, etc).')) return;
            const res = await apiFetch(`/superadmin/boxes/${id}`, { method: 'DELETE' });
            if (res?.ok) {
                if (selectedBoxId === id) selectBox(null);
                loadBoxes();
            }
        }

        async function selectBox(id) {
            selectedBoxId = id;
            loadBoxes();
            if (!id) {
                document.getElementById('userListPlaceholder').classList.remove('hidden');
                document.getElementById('userList').classList.add('hidden');
                return;
            }
            document.getElementById('userListPlaceholder').classList.add('hidden');
            const list = document.getElementById('userList');
            list.classList.remove('hidden');
            list.innerHTML = '<div class="animate-pulse space-y-3"><div class="h-10 bg-slate-50 rounded-xl"></div><div class="h-10 bg-slate-50 rounded-xl"></div></div>';
            
            const res = await apiFetch(`/superadmin/boxes/${id}/users`);
            if (res?.ok) {
                const users = await res.json();
                list.innerHTML = users.map(u => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-white border border-transparent hover:border-slate-100 transition-all">
                        <div class="min-w-0 flex-1 pr-4">
                            <div class="flex items-center gap-2">
                                <p class="font-bold text-slate-800 truncate">${u.name}</p>
                                ${u.role === 'BOX_ADMIN' ? '<span class="bg-indigo-100 text-indigo-600 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">Admin</span>' : ''}
                                ${u.role === 'COACH' ? '<span class="bg-emerald-100 text-emerald-600 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">Coach</span>' : ''}
                            </div>
                            <p class="text-[11px] font-semibold text-slate-400 truncate uppercase mt-0.5">${u.email}</p>
                        </div>
                        <select onchange="updateRole(${u.id}, this.value)" class="bg-white border border-slate-200 rounded-xl text-[10px] font-black uppercase text-indigo-600 focus:ring-0 cursor-pointer px-2 py-1">
                            <option value="ATHLETE" ${u.role === 'ATHLETE' ? 'selected' : ''}>Atleta</option>
                            <option value="COACH" ${u.role === 'COACH' ? 'selected' : ''}>Coach</option>
                            <option value="BOX_ADMIN" ${u.role === 'BOX_ADMIN' ? 'selected' : ''}>Box Admin</option>
                        </select>
                    </div>
                `).join('');
            }
        }

        async function updateRole(userId, role) {
            if (!selectedBoxId) return;
            const res = await apiFetch(`/superadmin/boxes/${selectedBoxId}/users/${userId}/role`, {
                method: 'PATCH',
                body: JSON.stringify({ role })
            });
            if (res?.ok) selectBox(selectedBoxId);
        }

        function showCreateBox() { document.getElementById('createModal').classList.remove('hidden'); }
        function hideCreateBox() { document.getElementById('createModal').classList.add('hidden'); }

        document.getElementById('createForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            const res = await apiFetch('/superadmin/boxes', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            if (res?.ok) {
                hideCreateBox();
                e.target.reset();
                loadBoxes();
                loadStats();
            } else {
                const err = await res.json();
                alert(err.error || 'Erro ao criar box');
            }
        };

        // Init Check
        const token = localStorage.getItem('fitToken');
        if (token) hideLogin();
        else showLogin();
    </script>
</body>
</html>
